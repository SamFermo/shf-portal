<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" preserveAspectRatio="xMidYMid meet" font-family="Caladea, Georgia, serif">
  <defs>
    <!-- paper texture -->
    <radialGradient id="paperGrad" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#fbf6ea"/>
      <stop offset="100%" stop-color="#ece2cc"/>
    </radialGradient>
    <pattern id="treeDots" x="0" y="0" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="6" cy="6" r="4" fill="#4a6a3a" opacity="0.55"/>
      <circle cx="16" cy="14" r="5" fill="#3a5a2a" opacity="0.65"/>
      <circle cx="3" cy="17" r="3" fill="#5a7a4a" opacity="0.5"/>
    </pattern>
    <pattern id="pasture" x="0" y="0" width="14" height="14" patternUnits="userSpaceOnUse">
      <rect width="14" height="14" fill="#dbe5c5"/>
      <line x1="0" y1="14" x2="14" y2="0" stroke="#c4d2a8" stroke-width="0.6"/>
    </pattern>
    <pattern id="cropField" x="0" y="0" width="40" height="20" patternUnits="userSpaceOnUse">
      <rect width="40" height="20" fill="#e8dcb8"/>
      <line x1="0" y1="10" x2="40" y2="10" stroke="#cdba8a" stroke-width="0.8"/>
    </pattern>
    <pattern id="orchard" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="5" fill="none" stroke="#4a6a3a" stroke-width="1.2" opacity="0.7"/>
      <circle cx="14" cy="14" r="2" fill="#4a6a3a" opacity="0.55"/>
    </pattern>
    <pattern id="water" x="0" y="0" width="36" height="14" patternUnits="userSpaceOnUse">
      <rect width="36" height="14" fill="#bcc8d0"/>
      <path d="M0 7 Q9 3, 18 7 T36 7" stroke="#9eb0bc" stroke-width="1.2" fill="none"/>
    </pattern>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.4"/>
      <feOffset dx="0.8" dy="1.2"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="1000" fill="url(#paperGrad)"/>

  <!-- Title plate -->
  <g transform="translate(400 38)">
    <text text-anchor="middle" font-size="22" font-weight="700" fill="#5a3a22" letter-spacing="2">SWAN HOUSE FARM</text>
    <text y="22" text-anchor="middle" font-size="11" font-style="italic" fill="#8a6a4a" letter-spacing="1">19479 Landing Rd · Mount Vernon · Skagit County</text>
  </g>

  <!-- Property boundary (irregular, approximate from conservation plan) -->
  <path d="M 80 130 L 720 130 L 720 200 L 680 220 L 720 280 L 720 760 L 580 940 L 200 940 L 90 820 L 70 500 L 60 280 Z"
        fill="none" stroke="#b04a1a" stroke-width="2.2" stroke-dasharray="6 4" opacity="0.7"/>

  <!-- East-of-property: open agricultural fields -->
  <rect x="720" y="200" width="60" height="560" fill="url(#cropField)" opacity="0.6"/>
  <text x="750" y="470" font-size="9" fill="#8a6a4a" text-anchor="middle" transform="rotate(90 750 470)" font-style="italic">(neighboring fields)</text>

  <!-- West forest (alder establishment) -->
  <path d="M 70 250 L 200 250 L 220 320 L 240 380 L 210 460 L 70 480 Z" fill="url(#treeDots)" opacity="0.85"/>
  <!-- South forest along river -->
  <path d="M 80 760 L 600 760 L 570 940 L 200 940 L 100 820 Z" fill="url(#treeDots)" opacity="0.55"/>
  <!-- North trees -->
  <path d="M 200 130 L 480 130 L 460 200 L 220 200 Z" fill="url(#treeDots)" opacity="0.7"/>
  <!-- East-side tree line buffer (along property boundary) -->
  <path d="M 660 200 L 720 220 L 720 760 L 640 760 L 640 220 Z" fill="url(#treeDots)" opacity="0.45"/>

  <!-- Pasture areas (general grass on the property) -->
  <rect x="100" y="500" width="240" height="240" fill="url(#pasture)" opacity="0.75"/>
  <rect x="420" y="250" width="240" height="150" fill="url(#pasture)" opacity="0.3"/>

  <!-- Orchard (planned) -->
  <rect x="430" y="220" width="200" height="120" fill="url(#orchard)" opacity="0.7"/>
  <text x="530" y="290" text-anchor="middle" font-size="11" font-style="italic" fill="#3a5a2a" letter-spacing="0.5">orchard</text>

  <!-- River along south edge -->
  <path d="M 110 920 Q 250 880, 400 905 T 690 880 L 690 960 L 110 960 Z" fill="url(#water)" opacity="0.85"/>
  <text x="400" y="945" text-anchor="middle" font-size="12" fill="#4a6470" font-style="italic" letter-spacing="2">Skagit River</text>

  <!-- Landing Road (curving N-S through property) -->
  <path d="M 470 130 L 460 220 L 425 320 Q 410 420, 410 520 L 405 700 L 395 760"
        fill="none" stroke="#c8a878" stroke-width="22" stroke-linecap="round"/>
  <path d="M 470 130 L 460 220 L 425 320 Q 410 420, 410 520 L 405 700 L 395 760"
        fill="none" stroke="#d8c0a0" stroke-width="20" stroke-linecap="round"/>
  <text x="438" y="180" font-size="11" font-weight="700" fill="#6a4a22" transform="rotate(8 438 180)" letter-spacing="1.5">LANDING RD</text>

  <!-- Boat launch road continuing south to river -->
  <path d="M 395 760 Q 380 820, 360 880" fill="none" stroke="#c8a878" stroke-width="14" stroke-linecap="round"/>
  <text x="320" y="850" font-size="9" font-style="italic" fill="#6a4a22" transform="rotate(70 320 850)">to boat launch</text>

  <!-- ===== BUILDINGS ===== -->
  <!-- All buildings get soft shadow and consistent wood-stain palette.
       Dinner-service buildings = darker wood (#5a3a22).
       Agricultural buildings   = lighter wood (#8a6a4a). -->

  <!-- MAIN HOUSE (large, east of road) — kitchen + garden shed + cellar -->
  <g filter="url(#softShadow)">
    <rect x="495" y="390" width="160" height="120" rx="3" fill="#5a3a22"/>
    <!-- Roof gable suggestion -->
    <polygon points="495,390 575,360 655,390" fill="#3a2412"/>
    <polygon points="575,360 575,390" fill="none" stroke="#3a2412" stroke-width="1"/>
    <!-- Indicate the cellar + garden shed rooms with subtle inset rectangles -->
    <rect x="500" y="478" width="50" height="28" fill="#3a2412" opacity="0.6"/>
    <rect x="600" y="478" width="50" height="28" fill="#3a2412" opacity="0.6"/>
    <text x="525" y="496" text-anchor="middle" font-size="8" fill="#fbf6ea" font-style="italic">cellar</text>
    <text x="625" y="496" text-anchor="middle" font-size="8" fill="#fbf6ea" font-style="italic">grd shed</text>
  </g>
  <g>
    <line x1="495" y1="448" x2="455" y2="430" stroke="#5a3a22" stroke-width="0.8" opacity="0.6"/>
    <rect x="365" y="404" width="90" height="36" rx="3" fill="#fbf6ea" stroke="#5a3a22" stroke-width="0.8"/>
    <text x="410" y="421" text-anchor="middle" font-size="13" font-weight="700" fill="#5a3a22">Main House</text>
    <text x="410" y="433" text-anchor="middle" font-size="8" fill="#8a6a4a" font-style="italic">kitchen · cellar · grd shed</text>
  </g>

  <!-- PERGOLA / DINING GARDEN (south of Main House) -->
  <g filter="url(#softShadow)">
    <rect x="500" y="530" width="150" height="70" rx="3" fill="#dbe5c5" stroke="#7a8a5a" stroke-width="1.5"/>
    <!-- Pergola beams -->
    <line x1="510" y1="540" x2="640" y2="540" stroke="#5a3a22" stroke-width="2"/>
    <line x1="510" y1="555" x2="640" y2="555" stroke="#5a3a22" stroke-width="1" opacity="0.6"/>
    <line x1="510" y1="570" x2="640" y2="570" stroke="#5a3a22" stroke-width="1" opacity="0.6"/>
    <line x1="510" y1="590" x2="640" y2="590" stroke="#5a3a22" stroke-width="2"/>
    <!-- Long table down the middle -->
    <rect x="525" y="558" width="100" height="14" fill="#8a6a4a"/>
  </g>
  <g>
    <line x1="575" y1="600" x2="600" y2="640" stroke="#5a3a22" stroke-width="0.8" opacity="0.6"/>
    <rect x="540" y="640" width="120" height="36" rx="3" fill="#fbf6ea" stroke="#5a3a22" stroke-width="0.8"/>
    <text x="600" y="657" text-anchor="middle" font-size="13" font-weight="700" fill="#5a3a22">Pergola</text>
    <text x="600" y="669" text-anchor="middle" font-size="8" fill="#8a6a4a" font-style="italic">the dining table</text>
  </g>

  <!-- PARKING LOT (west of road, north area) -->
  <g filter="url(#softShadow)">
    <rect x="280" y="300" width="100" height="60" rx="3" fill="#d8c8a8" stroke="#8a6a4a" stroke-width="1"/>
    <!-- A couple of stylized cars -->
    <rect x="295" y="315" width="22" height="12" rx="2" fill="#6a5a40"/>
    <rect x="295" y="335" width="22" height="12" rx="2" fill="#6a5a40"/>
    <rect x="335" y="315" width="22" height="12" rx="2" fill="#6a5a40"/>
    <rect x="335" y="335" width="22" height="12" rx="2" fill="#6a5a40"/>
  </g>
  <g>
    <line x1="280" y1="330" x2="240" y2="330" stroke="#5a3a22" stroke-width="0.8" opacity="0.6"/>
    <rect x="150" y="312" width="90" height="36" rx="3" fill="#fbf6ea" stroke="#5a3a22" stroke-width="0.8"/>
    <text x="195" y="329" text-anchor="middle" font-size="13" font-weight="700" fill="#5a3a22">Parking</text>
    <text x="195" y="341" text-anchor="middle" font-size="8" fill="#8a6a4a" font-style="italic">guest arrival</text>
  </g>

  <!-- FARM STAND + BATHROOM (between Parking and Swan House) -->
  <g filter="url(#softShadow)">
    <rect x="290" y="395" width="80" height="60" rx="3" fill="#5a3a22"/>
    <polygon points="290,395 330,375 370,395" fill="#3a2412"/>
    <!-- Window/door -->
    <rect x="320" y="425" width="20" height="22" fill="#3a2412"/>
    <!-- attached bath wing -->
    <rect x="368" y="415" width="22" height="40" fill="#5a3a22"/>
    <polygon points="368,415 379,405 390,415" fill="#3a2412"/>
  </g>
  <g>
    <line x1="290" y1="425" x2="240" y2="445" stroke="#5a3a22" stroke-width="0.8" opacity="0.6"/>
    <rect x="120" y="438" width="120" height="44" rx="3" fill="#fbf6ea" stroke="#5a3a22" stroke-width="0.8"/>
    <text x="180" y="455" text-anchor="middle" font-size="13" font-weight="700" fill="#5a3a22">Farm Stand</text>
    <text x="180" y="467" text-anchor="middle" font-size="8" fill="#8a6a4a" font-style="italic">w/ attached bathroom</text>
    <text x="180" y="478" text-anchor="middle" font-size="8" fill="#8a6a4a" font-style="italic">+ outdoor handwash</text>
  </g>

  <!-- SWAN HOUSE (small structure, west of road, south of Farm Stand) -->
  <g filter="url(#softShadow)">
    <rect x="290" y="500" width="70" height="55" rx="3" fill="#5a3a22"/>
    <polygon points="290,500 325,485 360,500" fill="#3a2412"/>
    <rect x="315" y="525" width="20" height="22" fill="#3a2412"/>
  </g>
  <g>
    <line x1="290" y1="528" x2="240" y2="540" stroke="#5a3a22" stroke-width="0.8" opacity="0.6"/>
    <rect x="120" y="528" width="120" height="36" rx="3" fill="#fbf6ea" stroke="#5a3a22" stroke-width="0.8"/>
    <text x="180" y="545" text-anchor="middle" font-size="13" font-weight="700" fill="#5a3a22">Swan House</text>
    <text x="180" y="557" text-anchor="middle" font-size="8" fill="#8a6a4a" font-style="italic">dish + glass storage</text>
  </g>

  <!-- BAR — east of Landing Rd, tucked against the Main House (west side of it) -->
  <g filter="url(#softShadow)">
    <!-- Long wooden table running parallel to road -->
    <rect x="448" y="410" width="42" height="80" rx="2" fill="#5a3a22"/>
    <!-- green egg (round) embedded in table -->
    <circle cx="469" cy="430" r="6.5" fill="#4a6a3a" stroke="#2e4624" stroke-width="0.8"/>
    <!-- propane grill (rectangular) further down -->
    <rect x="458" y="455" width="24" height="14" rx="1.5" fill="#a89a78"/>
    <line x1="461" y1="460" x2="479" y2="460" stroke="#6a5e48" stroke-width="0.6"/>
    <line x1="461" y1="464" x2="479" y2="464" stroke="#6a5e48" stroke-width="0.6"/>
  </g>
  <g>
    <line x1="448" y1="430" x2="395" y2="370" stroke="#5a3a22" stroke-width="0.8" opacity="0.6"/>
    <rect x="298" y="356" width="100" height="36" rx="3" fill="#fbf6ea" stroke="#5a3a22" stroke-width="0.8"/>
    <text x="348" y="373" text-anchor="middle" font-size="13" font-weight="700" fill="#5a3a22">Bar</text>
    <text x="348" y="385" text-anchor="middle" font-size="8" fill="#8a6a4a" font-style="italic">green egg + propane</text>
  </g>

  <!-- BARN + animal area -->
  <g filter="url(#softShadow)">
    <rect x="280" y="630" width="100" height="60" rx="3" fill="#8a6a4a"/>
    <polygon points="280,630 330,610 380,630" fill="#5a3a22"/>
    <rect x="320" y="660" width="20" height="30" fill="#3a2412"/>
  </g>
  <g>
    <!-- pig enclosure (small fenced area) -->
    <rect x="180" y="640" width="80" height="55" fill="none" stroke="#8a6a4a" stroke-width="1.5" stroke-dasharray="3 3"/>
    <text x="220" y="672" text-anchor="middle" font-size="9" fill="#5a3a22" font-style="italic">pig enclosure</text>
    <!-- lamb field (larger pasture) -->
    <rect x="160" y="700" width="240" height="60" fill="url(#pasture)" opacity="0.8" stroke="#8a6a4a" stroke-width="1" stroke-dasharray="4 4"/>
    <text x="280" y="734" text-anchor="middle" font-size="11" fill="#3a5a2a" font-style="italic" letter-spacing="0.5">Lamb Field</text>
  </g>
  <g>
    <line x1="330" y1="690" x2="500" y2="710" stroke="#5a3a22" stroke-width="0.8" opacity="0.6"/>
    <rect x="490" y="700" width="110" height="36" rx="3" fill="#fbf6ea" stroke="#5a3a22" stroke-width="0.8"/>
    <text x="545" y="717" text-anchor="middle" font-size="13" font-weight="700" fill="#5a3a22">Barn</text>
    <text x="545" y="729" text-anchor="middle" font-size="8" fill="#8a6a4a" font-style="italic">animals · farm work</text>
  </g>

  <!-- GLAMPGROUND (far west, in trees) -->
  <g filter="url(#softShadow)">
    <!-- Two tent silhouettes -->
    <polygon points="110,370 130,335 150,370" fill="#c8a878" stroke="#5a3a22" stroke-width="1"/>
    <polygon points="155,380 175,345 195,380" fill="#c8a878" stroke="#5a3a22" stroke-width="1"/>
  </g>
  <g>
    <line x1="155" y1="370" x2="170" y2="280" stroke="#5a3a22" stroke-width="0.8" opacity="0.6"/>
    <rect x="105" y="252" width="130" height="36" rx="3" fill="#fbf6ea" stroke="#5a3a22" stroke-width="0.8"/>
    <text x="170" y="269" text-anchor="middle" font-size="13" font-weight="700" fill="#5a3a22">Glampground</text>
    <text x="170" y="281" text-anchor="middle" font-size="8" fill="#8a6a4a" font-style="italic">in the alder grove</text>
  </g>

  <!-- North arrow -->
  <g transform="translate(740 90)">
    <circle r="22" fill="#fbf6ea" stroke="#5a3a22" stroke-width="1"/>
    <polygon points="0,-14 -8,8 0,2 8,8" fill="#5a3a22"/>
    <text y="20" text-anchor="middle" font-size="9" font-weight="700" fill="#5a3a22">N</text>
  </g>

  <!-- Legend (small key in bottom-left corner) -->
  <g transform="translate(56 802)">
    <rect width="180" height="98" rx="4" fill="#fbf6ea" stroke="#c8b890" stroke-width="0.8" opacity="0.94"/>
    <text x="90" y="14" text-anchor="middle" font-size="10" font-weight="700" fill="#5a3a22" letter-spacing="0.5">KEY</text>
    <rect x="8" y="22" width="14" height="10" fill="#5a3a22"/>
    <text x="28" y="31" font-size="9" fill="#3a2412">dinner-service building</text>
    <rect x="8" y="36" width="14" height="10" fill="#8a6a4a"/>
    <text x="28" y="45" font-size="9" fill="#3a2412">farm building</text>
    <rect x="8" y="50" width="14" height="10" fill="url(#pasture)"/>
    <text x="28" y="59" font-size="9" fill="#3a2412">pasture</text>
    <rect x="8" y="64" width="14" height="10" fill="url(#treeDots)"/>
    <text x="28" y="73" font-size="9" fill="#3a2412">forest</text>
    <rect x="8" y="78" width="14" height="10" fill="#d8c0a0"/>
    <text x="28" y="87" font-size="9" fill="#3a2412">road</text>
  </g>
</svg>
